<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Top 5 Matchups Today · MLB</title>
<link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;1,400;1,700&family=Special+Elite&display=swap" rel="stylesheet" />
<style>
  /* ── TOKENS ─────────────────────────────────────────── */
  :root {
    --cream:    #f5efdc;
    --tan:      #e8dcc0;
    --rust:     #c0392b;
    --navy:     #1a2744;
    --gold:     #d4a017;
    --dark:     #0d1520;
    --ink:      #1a1a1a;
    --muted:    #6b5e4a;
    --green:    #2d6a4f;
    --border:   #8b7355;
    --card-bg:  #fdf6e3;
    --shadow:   rgba(0,0,0,0.35);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    background-image:
      radial-gradient(ellipse at 20% 30%, rgba(26,39,68,0.8) 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.015) 40px, rgba(255,255,255,0.015) 41px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.015) 40px, rgba(255,255,255,0.015) 41px);
    min-height: 100vh;
    font-family: 'Barlow Condensed', sans-serif;
    color: var(--cream);
    padding: 0 0 60px;
  }

  /* ── HEADER ──────────────────────────────────────────── */
  header {
    background: var(--navy);
    border-bottom: 4px solid var(--gold);
    padding: 18px 24px 14px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      -45deg,
      transparent, transparent 10px,
      rgba(255,255,255,0.02) 10px, rgba(255,255,255,0.02) 11px
    );
  }
  .header-inner { position: relative; z-index: 1; }
  .header-eyebrow {
    font-family: 'Special Elite', cursive;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  h1 {
    font-family: 'Alfa Slab One', serif;
    font-size: clamp(28px, 5vw, 52px);
    color: var(--cream);
    line-height: 1;
    text-shadow: 3px 3px 0 var(--rust), 5px 5px 0 rgba(0,0,0,0.4);
    letter-spacing: 1px;
  }
  h1 span { color: var(--gold); }
  .header-date {
    font-size: 13px;
    color: var(--tan);
    letter-spacing: 2px;
    margin-top: 6px;
    font-weight: 600;
  }

  /* ── CONTROLS ────────────────────────────────────────── */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 18px 24px 10px;
    flex-wrap: wrap;
  }
  .date-input {
    background: var(--navy);
    border: 2px solid var(--border);
    color: var(--cream);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 600;
    padding: 8px 14px;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 1px;
  }
  .date-input:focus { outline: none; border-color: var(--gold); }

  .btn {
    font-family: 'Alfa Slab One', serif;
    font-size: 14px;
    letter-spacing: 1px;
    padding: 9px 22px;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .btn:active { transform: translateY(1px); }
  .btn-primary {
    background: var(--rust);
    color: #fff;
    box-shadow: 3px 3px 0 #8b1a13;
  }
  .btn-primary:hover { background: #d44235; }

  /* ── STATUS BAR ──────────────────────────────────────── */
  .status-bar {
    text-align: center;
    padding: 8px 24px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--gold);
    min-height: 32px;
  }
  .status-bar.error { color: #e74c3c; }
  .status-bar.loading { color: var(--tan); }

  /* ── GRID ────────────────────────────────────────────── */
  .cards-grid {
    display: flex;
    flex-direction: column;
    gap: 20px;
    max-width: 900px;
    margin: 0 auto;
    padding: 10px 20px 0;
  }

  /* ── MATCHUP CARD ────────────────────────────────────── */
  .matchup-card {
    background: var(--card-bg);
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 4px 6px 20px var(--shadow), 0 0 0 2px var(--border);
    position: relative;
    animation: cardIn 0.4s ease both;
  }
  .matchup-card:nth-child(1) { animation-delay: 0.05s; }
  .matchup-card:nth-child(2) { animation-delay: 0.12s; }
  .matchup-card:nth-child(3) { animation-delay: 0.19s; }
  .matchup-card:nth-child(4) { animation-delay: 0.26s; }
  .matchup-card:nth-child(5) { animation-delay: 0.33s; }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* rank badge */
  .rank-badge {
    position: absolute;
    top: 0; left: 0;
    width: 48px;
    height: 48px;
    background: var(--rust);
    clip-path: polygon(0 0, 100% 0, 0 100%);
    z-index: 2;
  }
  .rank-number {
    position: absolute;
    top: 4px; left: 5px;
    font-family: 'Alfa Slab One', serif;
    font-size: 18px;
    color: #fff;
    line-height: 1;
    z-index: 3;
  }

  /* card top band */
  .card-band {
    background: var(--navy);
    padding: 8px 16px 8px 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    flex-wrap: wrap;
  }
  .game-label {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--gold);
    text-transform: uppercase;
  }
  .score-badge {
    font-family: 'Special Elite', cursive;
    font-size: 11px;
    color: var(--tan);
    letter-spacing: 1px;
  }

  /* card body */
  .card-body {
    display: grid;
    grid-template-columns: 1fr 48px 1fr;
    align-items: center;
    padding: 14px 16px;
    gap: 8px;
  }

  /* player half */
  .player-half { display: flex; flex-direction: column; gap: 4px; }
  .player-half.pitcher { text-align: right; align-items: flex-end; }

  .player-role {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .player-name {
    font-family: 'Alfa Slab One', serif;
    font-size: clamp(15px, 2.2vw, 20px);
    color: var(--ink);
    line-height: 1.1;
  }
  .player-team {
    font-size: 12px;
    font-weight: 700;
    color: var(--rust);
    letter-spacing: 1px;
  }
  .hand-badge {
    display: inline-block;
    background: var(--navy);
    color: var(--cream);
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 3px;
    letter-spacing: 1px;
    margin-top: 2px;
    width: fit-content;
  }
  .hand-badge.advantage { background: var(--green); }

  /* stat chips */
  .stat-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 4px;
  }
  .player-half.pitcher .stat-row { justify-content: flex-end; }
  .stat-chip {
    background: var(--tan);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 2px 7px;
    font-size: 11px;
    font-weight: 700;
    color: var(--ink);
    white-space: nowrap;
  }
  .stat-chip span { color: var(--muted); font-weight: 600; margin-right: 2px; }
  .stat-chip.hot { background: #fff3cd; border-color: var(--gold); color: #7a5c00; }

  /* vs divider */
  .vs-divider {
    text-align: center;
    font-family: 'Alfa Slab One', serif;
    font-size: 13px;
    color: var(--muted);
    position: relative;
  }
  .vs-divider::before, .vs-divider::after {
    content: '';
    display: block;
    width: 1px;
    height: 24px;
    background: var(--border);
    margin: 0 auto;
  }

  /* matchup score bar */
  .score-section {
    border-top: 1px solid var(--tan);
    padding: 8px 16px 12px;
    background: #faf3e0;
  }
  .score-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .score-bar-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .score-bar {
    flex: 1;
    height: 10px;
    background: var(--tan);
    border-radius: 5px;
    overflow: hidden;
    position: relative;
  }
  .score-fill {
    height: 100%;
    border-radius: 5px;
    transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
  }
  .score-num {
    font-family: 'Alfa Slab One', serif;
    font-size: 22px;
    color: var(--ink);
    min-width: 42px;
    text-align: center;
  }
  .score-stars {
    display: flex;
    gap: 3px;
  }
  .star {
    font-size: 16px;
    color: #d0c090;
    transition: color 0.3s;
  }
  .star.lit { color: var(--gold); }

  /* reasons */
  .reasons-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 8px;
  }
  .reason-pill {
    background: var(--navy);
    color: var(--cream);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 3px 9px;
    border-radius: 12px;
  }
  .reason-pill.plus { background: var(--green); }
  .reason-pill.warn { background: #7a4400; }

  /* h2h box */
  .h2h-box {
    background: var(--navy);
    border-radius: 4px;
    padding: 6px 12px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-top: 8px;
    align-items: center;
  }
  .h2h-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
  }
  .h2h-stat {
    font-size: 12px;
    color: var(--tan);
    font-weight: 600;
  }
  .h2h-stat strong { color: #fff; }

  /* ── TIER BADGE ──────────────────────────────────────── */
  .tier-badge {
    display: inline-block;
    font-family: 'Alfa Slab One', serif;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 3px 10px;
    border-radius: 3px;
    margin-left: 8px;
    vertical-align: middle;
  }
  .tier-elite  { background: #1a4a1a; color: #7dff7d; border: 1px solid #3a8a3a; }
  .tier-strong { background: #1a3a1a; color: #a0e080; border: 1px solid #2d6a2d; }
  .tier-lean   { background: #3a3010; color: var(--gold); border: 1px solid #6a5810; }
  .tier-fade   { background: #3a1010; color: #ff8080; border: 1px solid #6a2020; }

  /* ── FACTOR BREAKDOWN ────────────────────────────────── */
  .factor-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px 8px;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed var(--tan);
  }
  .factor-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
  }
  .factor-bar-wrap {
    flex: 1;
    height: 5px;
    background: var(--tan);
    border-radius: 3px;
    overflow: hidden;
  }
  .factor-bar { height: 100%; border-radius: 3px; }
  .factor-label { color: var(--muted); font-size: 10px; white-space: nowrap; min-width: 60px; }
  .factor-val { font-weight: 700; color: var(--ink); font-size: 11px; min-width: 32px; text-align: right; }

  /* ── SKELETON ────────────────────────────────────────── */
  .skeleton-card {
    background: #1c2a40;
    border-radius: 6px;
    height: 210px;
    box-shadow: 4px 6px 20px var(--shadow);
    overflow: hidden;
    position: relative;
  }
  .skeleton-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.06) 50%, transparent 100%);
    animation: shimmer 1.4s infinite;
  }
  @keyframes shimmer {
    from { transform: translateX(-100%); }
    to   { transform: translateX(100%); }
  }

  /* ── EMPTY STATE ─────────────────────────────────────── */
  .empty-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 18px; font-weight: 600; letter-spacing: 1px; }
  .empty-state small { font-size: 13px; color: #5a4e3a; }

  /* ── FOOTER ──────────────────────────────────────────── */
  footer {
    text-align: center;
    padding: 24px;
    font-size: 11px;
    color: #3a3020;
    letter-spacing: 1px;
  }

  @media (max-width: 520px) {
    .card-body { grid-template-columns: 1fr 36px 1fr; padding: 10px 10px; }
    h1 { font-size: 28px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-eyebrow">⚾ Daily Dossier</div>
    <h1>TOP 5 <span>MATCHUPS</span></h1>
    <div class="header-date" id="header-date">Loading schedule…</div>
  </div>
</header>

<div class="controls">
  <input type="date" class="date-input" id="date-picker" />
  <button class="btn btn-primary" onclick="loadMatchups()">▶ LOAD MATCHUPS</button>
</div>
<div id="data-mode-banner" style="text-align:center;font-size:11px;letter-spacing:1.5px;font-weight:700;padding:4px 0 0;color:#4a8c3f;display:none">
  ⚡ INSTANT MODE — PRE-FETCHED DATA ACTIVE
</div>

<div class="status-bar" id="status-bar">Select a date and load matchups.</div>

<div class="cards-grid" id="cards-grid"></div>

<footer>Data: MLB Stats API &nbsp;·&nbsp; Scoring: OPS, ERA, K%, wOBA proxy, handedness &nbsp;·&nbsp; For entertainment purposes</footer>

<script>
/* ═══════════════════════════════════════════════════════════
   MLB MATCHUP RANKER
   • If MLB_DATA blob is present (injected by fetch_mlb_data.py)
     → instant, zero-network mode for dates 2023–2025
   • Otherwise falls back to live MLB Stats API via CORS proxy
   ═══════════════════════════════════════════════════════════ */

/* __MLB_DATA_START__ */
// MLB_DATA will be injected here by fetch_mlb_data.py
// Run: python fetch_mlb_data.py --inject mlb-matchups.html
/* __MLB_DATA_END__ */

const HAS_BLOB = typeof MLB_DATA !== 'undefined';

/* ── UTILITIES ──────────────────────────────────────── */
const $ = id => document.getElementById(id);
const today = () => new Date().toISOString().slice(0,10);
const fmt = d => new Date(d + 'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
const clamp = (v,mn,mx) => Math.min(mx, Math.max(mn, v));

function scoreColor(pct) {
  const r = [192, 56, 43], g = [212, 160, 23];
  const t = pct / 100;
  return `rgb(${r.map((c,i) => Math.round(c + t*(g[i]-c))).join(',')})`;
}

/* ── BLOB ACCESSORS ─────────────────────────────────── */
function blobSchedule(dateStr) {
  return HAS_BLOB ? (MLB_DATA.schedule[dateStr] || []) : null;
}
function blobRoster(teamId, season) {
  return HAS_BLOB ? (MLB_DATA.rosters[`${teamId}-${season}`] || []) : null;
}
function blobPlayer(playerId) {
  return HAS_BLOB ? (MLB_DATA.players[String(playerId)] || null) : null;
}
function blobHitStats(playerId, season) {
  const p = blobPlayer(playerId);
  return p ? (p.hitStats[String(season)] || {}) : null;
}
function blobPitStats(playerId, season) {
  const p = blobPlayer(playerId);
  return p ? (p.pitStats[String(season)] || {}) : null;
}
function blobRecentHit(playerId, season) {
  const p = blobPlayer(playerId);
  return p ? (p.recentHit[String(season)] || {}) : null;
}
function blobRecentPit(playerId, season) {
  const p = blobPlayer(playerId);
  return p ? (p.recentPit[String(season)] || {}) : null;
}
function blobH2H(batterId, pitcherId) {
  return HAS_BLOB ? (MLB_DATA.h2h[`${batterId}-${pitcherId}`] || null) : null;
}
function blobBio(playerId) {
  const p = blobPlayer(playerId);
  return p ? p.bio : null;
}

/* ── LIVE API FALLBACK ──────────────────────────────── */
const BASE = 'https://statsapi.mlb.com/api/v1';
const PROXY = 'https://corsproxy.io/?url=';

async function apiFetch(url) {
  const r = await fetch(PROXY + encodeURIComponent(url));
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

async function liveSchedule(dateStr) {
  const data = await apiFetch(`${BASE}/schedule?sportId=1&date=${dateStr}&hydrate=probablePitcher,team&gameType=R`);
  return (data.dates || []).flatMap(d => d.games || [])
    .filter(g => ['Scheduled','Pre-Game','Warmup','In Progress'].includes(g.status?.detailedState))
    .map(g => {
      const away = g.teams.away, home = g.teams.home;
      const t = g.gameDate ? new Date(g.gameDate).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZoneName:'short'}) : 'TBD';
      return {
        away: away.team?.abbreviation, home: home.team?.abbreviation,
        awayId: away.team?.id, homeId: home.team?.id,
        awayPit: away.probablePitcher?.id, awayPitN: away.probablePitcher?.fullName,
        homePit: home.probablePitcher?.id, homePitN: home.probablePitcher?.fullName,
        time: t,
      };
    });
}

async function liveHitStats(id, season) {
  try {
    const d = await apiFetch(`${BASE}/people/${id}/stats?stats=season&group=hitting&season=${season}`);
    const s = d.stats?.[0]?.splits?.[0]?.stat || {};
    return { avg:+s.avg||0, ops:+s.ops||0, hr:+s.homeRuns||0, rbi:+s.rbi||0, ab:+s.atBats||0, obp:+s.obp||0, slg:+s.slg||0 };
  } catch { return {}; }
}
async function livePitStats(id, season) {
  try {
    const d = await apiFetch(`${BASE}/people/${id}/stats?stats=season&group=pitching&season=${season}`);
    const s = d.stats?.[0]?.splits?.[0]?.stat || {};
    const era = +s.era||99, whip = +s.whip||99;
    return { era: era<99?era:null, whip: whip<99?whip:null, kp9:+s.strikeoutsPer9Inn||0, ip:+s.inningsPitched||0 };
  } catch { return {}; }
}
async function liveRecentHit(id, season) {
  try {
    const d = await apiFetch(`${BASE}/people/${id}/stats?stats=lastXGames&group=hitting&season=${season}&limit=14`);
    const s = d.stats?.[0]?.splits?.[0]?.stat || {};
    return { avg:+s.avg||0, ops:+s.ops||0, hr:+s.homeRuns||0 };
  } catch { return {}; }
}
async function liveRecentPit(id, season) {
  try {
    const d = await apiFetch(`${BASE}/people/${id}/stats?stats=lastXGames&group=pitching&season=${season}&limit=14`);
    const s = d.stats?.[0]?.splits?.[0]?.stat || {};
    const era = +s.era||99;
    return { era: era<99?era:null, ip:+s.inningsPitched||0 };
  } catch { return {}; }
}
async function liveH2H(batId, pitId) {
  try {
    const d = await apiFetch(`${BASE}/people/${batId}/stats?stats=vsPlayer&opposingPlayerId=${pitId}&group=hitting&sportId=1`);
    const s = d.stats?.[0]?.splits?.[0]?.stat;
    if (!s || +s.atBats < 3) return null;
    return { ab:+s.atBats, avg:+s.avg||0, hr:+s.homeRuns||0, ops:+s.ops||0 };
  } catch { return null; }
}
async function liveBio(id) {
  try {
    const d = await apiFetch(`${BASE}/people/${id}`);
    const p = d.people?.[0] || {};
    return { batSide: p.batSide?.code||'?', pitchHand: p.pitchHand?.code||'?' };
  } catch { return { batSide:'?', pitchHand:'?' }; }
}
async function liveRoster(teamId, season) {
  try {
    const d = await apiFetch(`${BASE}/teams/${teamId}/roster?rosterType=active&season=${season}`);
    return (d.roster||[]).filter(p=>!['P','TWP'].includes(p.position?.code))
      .slice(0,9).map(p=>({ id:p.person.id, name:p.person.fullName, pos:p.position?.abbreviation||'' }));
  } catch { return []; }
}

/* ── UNIFIED DATA LAYER ─────────────────────────────── */
async function getSchedule(dateStr) {
  if (HAS_BLOB) return blobSchedule(dateStr);
  return liveSchedule(dateStr);
}
async function getRoster(teamId, season) {
  const b = blobRoster(teamId, season);
  if (b !== null) return b;
  return liveRoster(teamId, season);
}
async function getHitStats(id, season) {
  const b = blobHitStats(id, season);
  if (b !== null) return b;
  return liveHitStats(id, season);
}
async function getPitStats(id, season) {
  const b = blobPitStats(id, season);
  if (b !== null) return b;
  return livePitStats(id, season);
}
async function getRecentHit(id, season) {
  const b = blobRecentHit(id, season);
  if (b !== null) return b;
  return liveRecentHit(id, season);
}
async function getRecentPit(id, season) {
  const b = blobRecentPit(id, season);
  if (b !== null) return b;
  return liveRecentPit(id, season);
}
async function getH2H(batId, pitId) {
  const b = blobH2H(batId, pitId);
  if (b !== null) return b;
  return liveH2H(batId, pitId);
}
async function getBio(id) {
  const b = blobBio(id);
  if (b !== null) return b;
  return liveBio(id);
}

/* ── PARK FACTORS ───────────────────────────────────── */
function getParkFactor(teamAbbr) {
  if (!HAS_BLOB || !MLB_DATA.parkFactors) return 100;
  return MLB_DATA.parkFactors[teamAbbr] || 100;
}

/* ── SCORING ENGINE ─────────────────────────────────── */
/*
  Weighted factor model — each factor contributes to a 0–100 score.

  Factor                Weight   Source
  ─────────────────────────────────────────────────────
  Platoon OPS split      25 pts  Real L/R OPS from API
  Pitcher ERA             18 pts  Season ERA
  Park factor             12 pts  wRC+ park adjustment
  Batter K% vs Pit K%    12 pts  Contact / strikeout risk
  Recent form (L14)       12 pts  Hot/cold streaks
  Head-to-head history    10 pts  Career matchup data
  Pitcher WHIP             6 pts  Baserunner suppression
  Lineup position          5 pts  Top of order bonus
  ─────────────────────────────────────────────────────
  Base                    50 pts  Neutral starting point

  Tier:  ≥80 → ELITE  |  65–79 → STRONG  |  50–64 → LEAN  |  <50 → FADE
*/
function scoreMatchup(hStat, pStat, h2h, recentH, recentP, batSide, pitchHand,
                      platoonHit, platoonPit, parkFactor, lineupOrder, batterKPct, batterBBPct) {
  let score = 50;
  const factors = [];  // { label, delta, pct }

  // ── 1. PLATOON SPLIT OPS (25 pts max) ──────────────────
  // Use real split OPS vs pitcher handedness instead of flat bonus
  const splitKey = pitchHand === 'L' ? 'vsL' : 'vsR';
  const platoonOPS = platoonHit?.[splitKey]?.ops;
  const platoonAB  = platoonHit?.[splitKey]?.ab || 0;

  if (platoonOPS && platoonAB >= 30) {
    // Compare to league average OPS (~.720)
    const delta = (platoonOPS - 0.720) * 100;
    const pts = clamp(delta * 0.6, -15, 25);
    score += pts;
    if (pts >= 10)       factors.push({ text: `Split OPS ${platoonOPS.toFixed(3)} vs ${pitchHand}HP`, type: 'plus' });
    else if (pts <= -8)  factors.push({ text: `Split OPS ${platoonOPS.toFixed(3)} vs ${pitchHand}HP`, type: 'warn' });
  } else {
    // Fallback to handedness advantage heuristic if split sample is small
    const advL = batSide === 'L' && pitchHand === 'R';
    const advR = batSide === 'R' && pitchHand === 'L';
    if (advL || advR)       { score += 8; factors.push({ text: `${batSide}HB vs ${pitchHand}HP ✓`, type: 'plus' }); }
    else if (batSide === pitchHand) { score -= 4; factors.push({ text: `${batSide}HB vs ${pitchHand}HP`, type: 'warn' }); }
  }

  // ── 2. PITCHER ERA (18 pts) ─────────────────────────────
  // Use platoon ERA vs batter side if available, else season ERA
  const pitPlatoonKey = batSide === 'L' ? 'vl' : 'vr';
  const pitPlatoon    = platoonPit?.[pitPlatoonKey];
  const era = (pitPlatoon?.bf >= 30 && pitPlatoon?.era != null)
    ? pitPlatoon.era
    : pStat.era;

  if (era != null) {
    if      (era < 2.75) { score -= 18; factors.push({ text: `ERA ${era.toFixed(2)}`, type: 'warn' }); }
    else if (era < 3.50) { score -= 10; factors.push({ text: `ERA ${era.toFixed(2)}`, type: 'warn' }); }
    else if (era < 4.20) { score -= 3; }
    else if (era < 5.00) { score += 8;  factors.push({ text: `ERA ${era.toFixed(2)}`, type: 'plus' }); }
    else                 { score += 18; factors.push({ text: `ERA ${era.toFixed(2)}`, type: 'plus' }); }
  }

  // ── 3. PARK FACTOR (12 pts) ────────────────────────────
  if (parkFactor && parkFactor !== 100) {
    const parkDelta = (parkFactor - 100) * 0.4;
    score += clamp(parkDelta, -12, 12);
    if (parkFactor >= 108)  factors.push({ text: `Hitter park (${parkFactor})`, type: 'plus' });
    else if (parkFactor <= 94) factors.push({ text: `Pitcher park (${parkFactor})`, type: 'warn' });
  }

  // ── 4. STRIKEOUT RISK (12 pts) ──────────────────────────
  // High-K pitcher vs high-K batter = bad. Low K pitcher or patient batter = good.
  const pitKPct = pitPlatoon?.kPct ?? pStat.kPct;
  if (pitKPct != null && batterKPct != null) {
    // Blended K risk: average of pitcher tendency and batter tendency
    const kRisk = (pitKPct + batterKPct) / 2;
    if      (kRisk > 0.30)  { score -= 12; factors.push({ text: `High K risk (${Math.round(kRisk*100)}%)`, type: 'warn' }); }
    else if (kRisk > 0.24)  { score -= 5; }
    else if (kRisk < 0.16)  { score += 12; factors.push({ text: `Low K risk (${Math.round(kRisk*100)}%)`, type: 'plus' }); }
    else if (kRisk < 0.20)  { score += 5; }
  } else if (pStat.kp9 != null) {
    // Fallback to K/9
    if      (pStat.kp9 >= 11) { score -= 10; factors.push({ text: `K/9 ${pStat.kp9.toFixed(1)}`, type: 'warn' }); }
    else if (pStat.kp9 <= 7)  { score += 7; }
  }

  // Walk rate bonus — patient batter vs wild pitcher
  if (batterBBPct != null && pStat.whip != null) {
    if (batterBBPct > 0.12 && pStat.whip > 1.35) { score += 5; factors.push({ text: `Patient bat + wild P`, type: 'plus' }); }
  }

  // ── 5. RECENT FORM — BATTER (12 pts) ────────────────────
  if (recentH?.ops) {
    if      (recentH.ops >= 1.000) { score += 12; factors.push({ text: `🔥 L14 OPS ${recentH.ops.toFixed(3)}`, type: 'plus' }); }
    else if (recentH.ops >= 0.900) { score += 8;  factors.push({ text: `Hot L14 OPS ${recentH.ops.toFixed(3)}`, type: 'plus' }); }
    else if (recentH.ops >= 0.800) { score += 4; }
    else if (recentH.ops < 0.550)  { score -= 10; factors.push({ text: `Cold L14 OPS ${recentH.ops.toFixed(3)}`, type: 'warn' }); }
    else if (recentH.ops < 0.650)  { score -= 5; }
  }

  // ── RECENT FORM — PITCHER (part of factor 5) ──────────
  if (recentP?.era != null && recentP?.ip >= 3) {
    if      (recentP.era >= 6.00) { score += 8; factors.push({ text: `P struggling ERA ${recentP.era.toFixed(2)}`, type: 'plus' }); }
    else if (recentP.era >= 4.50) { score += 4; }
    else if (recentP.era < 1.80)  { score -= 8; factors.push({ text: `P locked in ERA ${recentP.era.toFixed(2)}`, type: 'warn' }); }
    else if (recentP.era < 2.80)  { score -= 4; }
  }

  // ── 6. HEAD-TO-HEAD (10 pts) ────────────────────────────
  if (h2h?.ab >= 5) {
    const h2hAvg3 = Math.round(h2h.avg * 1000).toString().padStart(3, '0');
    if      (h2h.avg >= 0.380)                  { score += 10; factors.push({ text: `H2H .${h2hAvg3} (${h2h.ab} AB)`, type: 'plus' }); }
    else if (h2h.avg >= 0.300)                  { score += 5; }
    else if (h2h.avg <= 0.130 && h2h.ab >= 10)  { score -= 10; factors.push({ text: `H2H .${h2hAvg3} (${h2h.ab} AB)`, type: 'warn' }); }
    else if (h2h.avg <= 0.180 && h2h.ab >= 7)   { score -= 5; }
    if (h2h.hr >= 2) { score += 4; }
    if (h2h.ops >= 0.950 && h2h.ab >= 8) { score += 4; factors.push({ text: `H2H OPS ${h2h.ops.toFixed(3)}`, type: 'plus' }); }
  }

  // ── 7. PITCHER WHIP (6 pts) ─────────────────────────────
  if (pStat.whip != null) {
    if      (pStat.whip < 1.05) { score -= 6; }
    else if (pStat.whip < 1.20) { score -= 2; }
    else if (pStat.whip > 1.50) { score += 6; factors.push({ text: `WHIP ${pStat.whip.toFixed(2)}`, type: 'plus' }); }
    else if (pStat.whip > 1.35) { score += 3; }
  }

  // ── 8. LINEUP POSITION (5 pts) ──────────────────────────
  if (lineupOrder != null) {
    if      (lineupOrder <= 2) { score += 5; }   // leadoff / 2-hole — most PAs
    else if (lineupOrder <= 4) { score += 3; }   // 3/4 hole — RBI spot
    else if (lineupOrder >= 7) { score -= 3; }   // bottom of order
  }

  score = clamp(Math.round(score), 1, 99);

  // Confidence tier
  let tier, tierClass;
  if      (score >= 80) { tier = 'ELITE';  tierClass = 'tier-elite'; }
  else if (score >= 65) { tier = 'STRONG'; tierClass = 'tier-strong'; }
  else if (score >= 50) { tier = 'LEAN';   tierClass = 'tier-lean'; }
  else                  { tier = 'FADE';   tierClass = 'tier-fade'; }

  return { score, tier, tierClass, factors: factors.slice(0, 5) };
}

/* ── BLOB PLATOON HELPERS ───────────────────────────── */
function blobPlatoonHit(playerId, season) {
  const p = blobPlayer(playerId);
  return p ? (p.platoonHit?.[String(season)] || {}) : null;
}
function blobPlatoonPit(playerId, season) {
  const p = blobPlayer(playerId);
  return p ? (p.platoonPit?.[String(season)] || {}) : null;
}
async function getPlatoonHit(id, season) {
  const b = blobPlatoonHit(id, season);
  if (b !== null) return b;
  // live fallback
  try {
    const d = await apiFetch(`${BASE}/people/${id}/stats?stats=statSplits&group=hitting&season=${season}&sitCodes=vl,vr`);
    const result = {};
    for (const split of (d.stats?.[0]?.splits || [])) {
      const code = split.split?.code;
      const s = split.stat || {};
      const pa = +s.plateAppearances || 1;
      if (code === 'vl' || code === 'vr') {
        const key = code === 'vl' ? 'vsL' : 'vsR';
        result[key] = { ops: +s.ops||0, avg: +s.avg||0, ab: +s.atBats||0,
          kPct: (+s.strikeOuts||0)/pa, bbPct: (+s.baseOnBalls||0)/pa };
      }
    }
    return result;
  } catch { return {}; }
}
async function getPlatoonPit(id, season) {
  const b = blobPlatoonPit(id, season);
  if (b !== null) return b;
  try {
    const d = await apiFetch(`${BASE}/people/${id}/stats?stats=statSplits&group=pitching&season=${season}&sitCodes=vl,vr`);
    const result = {};
    for (const split of (d.stats?.[0]?.splits || [])) {
      const code = split.split?.code;
      const s = split.stat || {};
      const bf = +s.battersFaced || 0;
      const era = +s.era || 99;
      if (code === 'vl' || code === 'vr') {
        result[code] = { era: era<99?era:null, kPct: bf?(+s.strikeOuts||0)/bf:null,
          bbPct: bf?(+s.baseOnBalls||0)/bf:null, bf };
      }
    }
    return result;
  } catch { return {}; }
}

/* ── CARD RENDERER ──────────────────────────────────── */
function renderCard(rank, batter, pitcher, game, hStat, pStat, h2h, recentH, recentP,
                    batBio, pitBio, platoonHit, platoonPit, parkFactor) {
  const { score, tier, tierClass, factors } = scoreMatchup(
    hStat, pStat, h2h, recentH, recentP,
    batBio.batSide, pitBio.pitchHand,
    platoonHit, platoonPit, parkFactor,
    batter.order, hStat.kPct, hStat.bbPct
  );
  const stars    = Math.min(5, Math.max(1, Math.round(score / 20)));
  const hasAdv   = (batBio.batSide==='L' && pitBio.pitchHand==='R') || (batBio.batSide==='R' && pitBio.pitchHand==='L');
  const avgFmt   = v => v ? '.'+String(Math.round(v*1000)).padStart(3,'0') : '---';
  const chip     = (lbl, val) => val != null && val !== '' ? `<div class="stat-chip"><span>${lbl}</span>${val}</div>` : '';
  const gameTime = game.time ? new Date(game.time).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZoneName:'short'}) : 'TBD';

  const splitKey   = pitBio.pitchHand === 'L' ? 'vsL' : 'vsR';
  const platoonOPS = platoonHit?.[splitKey]?.ops;
  const platoonAB  = platoonHit?.[splitKey]?.ab || 0;

  const h2hHtml = h2h && h2h.ab >= 3 ? `
    <div class="h2h-box">
      <span class="h2h-label">H2H</span>
      <span class="h2h-stat"><strong>${h2h.ab}</strong> AB</span>
      <span class="h2h-stat"><strong>${avgFmt(h2h.avg)}</strong> AVG</span>
      ${h2h.hr ? `<span class="h2h-stat"><strong>${h2h.hr}</strong> HR</span>` : ''}
      ${h2h.ops ? `<span class="h2h-stat"><strong>${h2h.ops.toFixed(3)}</strong> OPS</span>` : ''}
    </div>` : '';

  const starHtml  = [1,2,3,4,5].map(i => `<span class="star${i<=stars?' lit':''}>\u2605</span>`).join('');
  const pillsHtml = factors.map(r => `<span class="reason-pill ${r.type}">${r.text}</span>`).join('');

  const factorRows = [
    { label: 'Platoon OPS', val: platoonOPS ? platoonOPS.toFixed(3) : (hStat.ops ? hStat.ops.toFixed(3) : '\u2014'), pct: Math.min(100, ((platoonOPS||hStat.ops||0)/1.1)*100), color: '#2d6a4f' },
    { label: 'Pitcher ERA', val: pStat.era != null ? pStat.era.toFixed(2) : '\u2014', pct: pStat.era != null ? Math.min(100,(8-pStat.era)/8*100) : 50, color: '#c0392b' },
    { label: 'Park Factor', val: parkFactor || '\u2014', pct: Math.min(100,Math.max(0,(parkFactor-85)/35*100)), color: '#d4a017' },
    { label: 'Form (L14)',  val: recentH?.ops ? recentH.ops.toFixed(3) : '\u2014', pct: Math.min(100,((recentH?.ops||0)/1.1)*100), color: '#1a2744' },
  ].map(f => `
    <div class="factor-row">
      <span class="factor-label">${f.label}</span>
      <div class="factor-bar-wrap"><div class="factor-bar" style="width:${Math.max(4,f.pct)}%;background:${f.color}"></div></div>
      <span class="factor-val">${f.val}</span>
    </div>`).join('');

  const pitPlatKey = batBio.batSide==='L' ? 'vl' : 'vr';
  const pitPlatERA = platoonPit?.[pitPlatKey]?.era;

  return `
  <div class="matchup-card">
    <div class="rank-badge"></div>
    <div class="rank-number">${rank}</div>
    <div class="card-band">
      <span class="game-label">${game.away} <span style="color:#6b8aad">@</span> ${game.home}</span>
      <span class="score-badge">${gameTime}${parkFactor && parkFactor !== 100 ? \` \u00b7 PF ${parkFactor}\` : ''}</span>
    </div>
    <div class="card-body">
      <div class="player-half batter">
        <div class="player-role">Batter${batter.order ? ` \u00b7 #${batter.order}` : ''}</div>
        <div class="player-name">${batter.name}</div>
        <div class="player-team">${batter.team} \u00b7 ${batter.pos||''}</div>
        <div class="hand-badge${hasAdv?' advantage':''}">${batBio.batSide==='L'?'LHB':batBio.batSide==='R'?'RHB':'SHB'}</div>
        <div class="stat-row">
          ${chip('AVG', avgFmt(hStat.avg))}
          ${chip('OPS', hStat.ops ? hStat.ops.toFixed(3) : '')}
          ${hStat.hr ? chip('HR', hStat.hr) : ''}
        </div>
        ${platoonOPS && platoonAB >= 20 ? `<div class="stat-row"><div class="stat-chip${platoonOPS >= 0.820 ? ' hot' : ''}">vs${pitBio.pitchHand}HP OPS ${platoonOPS.toFixed(3)}</div></div>` : ''}
        ${recentH?.ops >= 0.900 ? `<div class="stat-row"><div class="stat-chip hot">\ud83d\udd25 L14 OPS ${recentH.ops.toFixed(3)}</div></div>` : ''}
      </div>
      <div class="vs-divider">VS</div>
      <div class="player-half pitcher">
        <div class="player-role">Pitcher</div>
        <div class="player-name">${pitcher.name}</div>
        <div class="player-team">${pitcher.team}</div>
        <div class="hand-badge">${pitBio.pitchHand==='L'?'LHP':'RHP'}</div>
        <div class="stat-row">
          ${chip('ERA', pStat.era!=null ? pStat.era.toFixed(2) : '')}
          ${chip('WHIP', pStat.whip!=null ? pStat.whip.toFixed(2) : '')}
          ${chip('K/9', pStat.kp9 ? pStat.kp9.toFixed(1) : '')}
        </div>
        ${pitPlatERA != null ? `<div class="stat-row"><div class="stat-chip">vs${batBio.batSide}HB ERA ${pitPlatERA.toFixed(2)}</div></div>` : ''}
      </div>
    </div>
    <div class="score-section">
      <div class="score-label">Matchup Score <span class="tier-badge ${tierClass}">${tier}</span></div>
      <div class="score-bar-wrap">
        <div class="score-num">${score}</div>
        <div class="score-bar">
          <div class="score-fill" style="width:${score}%;background:${scoreColor(score)}"></div>
        </div>
        <div class="score-stars">${starHtml}</div>
      </div>
      ${h2hHtml}
      <div class="reasons-row">${pillsHtml}</div>
      <div class="factor-grid">${factorRows}</div>
    </div>
  </div>`;
}

/* ── SKELETON ───────────────────────────────────────── */
function showSkeletons() {
  $('cards-grid').innerHTML = Array(5).fill('<div class="skeleton-card"></div>').join('');
}

/* ── MAIN LOAD ──────────────────────────────────────── */
async function loadMatchups() {
  const dateVal = $('date-picker').value;
  if (!dateVal) { setStatus('Please pick a date first.', 'error'); return; }
  const season = dateVal.slice(0,4);

  $('header-date').textContent = fmt(dateVal);
  setStatus(HAS_BLOB ? '\u26a1 Loading from pre-fetched data\u2026' : '\ud83c\udf10 Fetching live data\u2026', 'loading');
  showSkeletons();

  try {
    const games = await getSchedule(dateVal);

    if (!games || !games.length) {
      $('cards-grid').innerHTML = `<div class="empty-state"><div class="icon">\u26be</div><p>No games scheduled</p><small>${fmt(dateVal)}</small></div>`;
      setStatus('No MLB games found for this date.', 'error');
      return;
    }

    setStatus(`Found ${games.length} game(s) \u2014 ranking matchups\u2026`, 'loading');

    const allMatchups = [];
    const SLEEP = HAS_BLOB ? 0 : 80;

    for (const g of games) {
      const pitchers = [];
      if (g.awayPit) pitchers.push({ id: g.awayPit, name: g.awayPitN, team: g.away, battingTeamId: g.homeId, battingTeam: g.home, parkTeam: g.home });
      if (g.homePit) pitchers.push({ id: g.homePit, name: g.homePitN, team: g.home, battingTeamId: g.awayId, battingTeam: g.away, parkTeam: g.home });

      for (const pit of pitchers) {
        const parkFactor = getParkFactor(pit.parkTeam);

        const [pitStat, pitBio, roster, platoonPit] = await Promise.all([
          getPitStats(pit.id, season),
          getBio(pit.id),
          getRoster(pit.battingTeamId, season),
          getPlatoonPit(pit.id, season),
        ]);
        const recentP = await getRecentPit(pit.id, season);

        for (const batter of roster.slice(0, 6)) {
          const [hStat, batBio, h2h, recentH, platoonHit] = await Promise.all([
            getHitStats(batter.id, season),
            getBio(batter.id),
            getH2H(batter.id, pit.id),
            getRecentHit(batter.id, season),
            getPlatoonHit(batter.id, season),
          ]);

          if (!hStat.ab || hStat.ab < 20) continue;

          const { score } = scoreMatchup(
            hStat, pitStat||{}, h2h, recentH, recentP,
            batBio.batSide, pitBio.pitchHand,
            platoonHit, platoonPit, parkFactor,
            batter.order, hStat.kPct, hStat.bbPct
          );
          allMatchups.push({
            score,
            batter: { ...batter, team: pit.battingTeam },
            pitcher: { id: pit.id, name: pit.name, team: pit.team },
            game: { away: g.away, home: g.home, time: g.time },
            hStat, pitStat: pitStat||{}, h2h, recentH, recentP: recentP||{},
            batBio, pitBio, platoonHit: platoonHit||{}, platoonPit: platoonPit||{}, parkFactor
          });
        }
        if (SLEEP) await new Promise(r => setTimeout(r, SLEEP));
      }
    }

    if (!allMatchups.length) {
      $('cards-grid').innerHTML = `<div class="empty-state"><div class="icon">\ud83d\udcca</div><p>Not enough stat data available</p><small>Try a regular-season date (Apr\u2013Oct).</small></div>`;
      setStatus('Insufficient stat data for this date.', '');
      return;
    }

    const seen = new Set();
    const top5 = allMatchups
      .sort((a,b) => b.score - a.score)
      .filter(m => { const k = `${m.batter.id}-${m.pitcher.id}`; if (seen.has(k)) return false; seen.add(k); return true; })
      .slice(0, 5);

    $('cards-grid').innerHTML = top5.map((m,i) =>
      renderCard(i+1, m.batter, m.pitcher, m.game, m.hStat, m.pitStat, m.h2h, m.recentH, m.recentP,
                 m.batBio, m.pitBio, m.platoonHit, m.platoonPit, m.parkFactor)
    ).join('');

    setStatus(`\u2714 Top ${top5.length} matchups for ${fmt(dateVal)}${HAS_BLOB ? ' \u2014 instant mode' : ''}`, '');

  } catch (err) {
    console.error(err);
    $('cards-grid').innerHTML = '';
    setStatus(`Error: ${err.message}`, 'error');
  }
}

function setStatus(msg, cls='') {
  const el = $('status-bar');
  el.textContent = msg;
  el.className = 'status-bar ' + cls;
}

/* ── INIT ───────────────────────────────────────────── */
(function init() {
  $('date-picker').value = today();
  $('header-date').textContent = fmt(today());
  if (HAS_BLOB) {
    $('data-mode-banner').style.display = 'block';
    const built = MLB_DATA.meta?.built;
    const seasons = MLB_DATA.meta?.seasons?.join(', ');
    if (built) $('data-mode-banner').textContent = `⚡ INSTANT MODE · Seasons ${seasons} · Built ${built}`;
  }
})();
</script>
